# docker-compose.prod.yml
version: "3.9"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379/0
  APP_ENV: production
  DEBUG: "false"
  JWT_SECRET: ${JWT_SECRET}
  PAYSTACK_SECRET: ${PAYSTACK_SECRET}
  PAYSTACK_PUBLIC: ${PAYSTACK_PUBLIC}
  FLUTTERWAVE_SECRET: ${FLUTTERWAVE_SECRET}
  STRIPE_SECRET: ${STRIPE_SECRET}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY}
  MAIL_FROM: ${MAIL_FROM}
  FRONTEND_URL: ${FRONTEND_URL}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
  SENTRY_DSN: ${SENTRY_DSN}

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --no-access-log
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wearify
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: wss://${DOMAIN}
    restart: unless-stopped
    networks:
      - wearify

  # ── Celery Workers ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.tasks worker
      --loglevel=warning
      --concurrency=4
      -Q default,emails,orders,notifications,analytics
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      - redis
      - postgres
    networks:
      - wearify
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks beat --loglevel=warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      - redis
    networks:
      - wearify

  # ── Celery Flower (monitoring, admin-only access) ─────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    restart: unless-stopped
    environment: *backend-env
    ports:
      - "127.0.0.1:5555:5555"   # only accessible locally
    depends_on:
      - redis
    networks:
      - wearify

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wearify
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wearify

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - wearify

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  wearify:
    driver: bridge
